name: Documentation (Beta)

# Refreshes /beta/styleguide/ on every beta push. Note that
# `documentation.yml` also triggers on beta now and deploys the full
# Docusaurus + Styleguidist to gh-pages root + /styleguide/. This
# workflow keeps the historical /beta/styleguide/ URL working as a
# parallel snapshot of the beta-channel styleguide build.
on:
  push:
    branches:
      - beta

# Same concurrency group as documentation.yml so deploys serialize
# rather than race the gh-pages branch.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy-beta:
    name: Deploy Beta Styleguide
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and build component styleguide
        timeout-minutes: 10
        run: |
          cd styleguide
          npm ci --legacy-peer-deps
          npm run build

      - name: Deploy styleguide to /beta/ on GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./styleguide/build
          publish_branch: gh-pages
          destination_dir: beta/styleguide
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          keep_files: true
