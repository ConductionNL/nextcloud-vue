name: Code Quality

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta, development]

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint
        continue-on-error: true

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
