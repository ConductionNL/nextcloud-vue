name: Release

# Auto-publish @conduction/nextcloud-vue to npm via semantic-release.
#
# Authentication: NPM_TOKEN (org-level secret) for the actual publish +
# OIDC provenance attestation (NPM_CONFIG_PROVENANCE=true) for supply-chain
# verification. The Trusted-Publisher-only design did not work because
# @semantic-release/npm's verifyConditions step calls `npm whoami` before
# publish, which fails without a token even when OIDC publish would
# subsequently succeed. NPM_TOKEN satisfies the verify step; the publish
# itself is still attested via OIDC provenance.
#
# To rotate: regenerate the NPM_TOKEN repo/org secret on npmjs.com and
# update it under repo Settings → Secrets → Actions.
#
# Node 24 is the floor: semantic-release@24 requires Node ^22.14 || ≥24.10
# and the publish path uses npm CLI's provenance support, which lands in
# npm 11.x (bundled with Node 24).

on:
  push:
    branches: [main, beta]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  release:
    name: Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write       # @semantic-release/git pushes the chore(release) bump back to beta/main
      issues: write
      pull-requests: write
      id-token: write       # npm Trusted Publisher (OIDC) + provenance attestation
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
