name: Release

# Auto-publish @conduction/nextcloud-vue to npm via semantic-release.
#
# Authentication: npm Trusted Publisher (OIDC) — no NPM_TOKEN secret to
# rotate. The runner mints a short-lived ID token via `id-token: write`,
# npm validates the {repo, workflow} claim against its trust config, and
# issues a one-shot publish credential. Provenance attestations are
# signed automatically (NPM_CONFIG_PROVENANCE=true).
#
# Why @semantic-release/exec instead of @semantic-release/npm publishing
# directly: as of v12.x, @semantic-release/npm has no OIDC awareness and
# its `verify-auth` step refuses to run without an NPM_TOKEN. We set
# `npmPublish: false` on that plugin (which only does the in-place
# version bump in package.json) and run the OIDC publish via
# @semantic-release/exec in the same publish lifecycle. The plugin
# invokes `npx -y npm@latest` because Node 24's bundled npm 11.x is
# usually OIDC-capable but the npx form is hardened against version
# regressions.
#
# Trust config on npmjs.com expects this workflow at the path
# `.github/workflows/release.yml` in `ConductionNL/nextcloud-vue`. If
# you rename or move this file, update the npm Trusted Publisher config.
#
# Node 24 is the floor: semantic-release@24 requires Node ^22.14 || ≥24.10
# and the publish path uses npm CLI's OIDC support, which lands in
# npm 11.x (bundled with Node 24).
#
# Pattern mirrored from `ConductionNL/design-system`'s
# `publish-packages.yml` for `@conduction/docusaurus-preset` — the only
# Conduction package currently shipping cleanly via semantic-release +
# OIDC.

on:
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release --dry-run only (no publish, no tag, no release)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build

  release:
    name: Release
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write       # @semantic-release/git pushes the chore(release) bump back to beta/main
      issues: write
      pull-requests: write
      id-token: write       # npm Trusted Publisher (OIDC) + provenance attestation
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci --legacy-peer-deps

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi
