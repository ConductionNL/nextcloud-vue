name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    # Only deploy on push, not on pull requests
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build component styleguide
        timeout-minutes: 10
        run: |
          cd styleguide
          npm ci
          npm run build

      - name: Clear build cache and install dependencies
        timeout-minutes: 3
        run: |
          cd docusaurus
          rm -rf node_modules/.cache
          rm -rf .docusaurus
          rm -rf build
          npm run ci

      - name: Verify build output
        run: |
          cd docusaurus/build
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found in build directory!"
            exit 1
          fi

      - name: Copy styleguide into Docusaurus build
        run: |
          mkdir -p docusaurus/build/styleguide
          cp -r styleguide/build/. docusaurus/build/styleguide/


      - name: Create .nojekyll file
        run: |
          cd docusaurus/build
          touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docusaurus/build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: false
          allow_empty_commit: true
          keep_files: true

      - name: Verify deployment
        run: |
          git fetch origin gh-pages
          echo "Deployment completed. Latest commit: $(git rev-parse origin/gh-pages)"
