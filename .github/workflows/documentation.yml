name: Documentation

# Deploys the full Docusaurus + Styleguidist site to gh-pages root.
# Triggers on push to BOTH `main` and `beta` so the new site can ship
# without waiting for a beta -> main release. `main` and `beta` push to
# the same gh-pages root; the most recent push wins (idempotent for
# identical sources, and Docusaurus is built fresh each time).
on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta
  # Allow manual deploy from the Actions UI or `gh workflow run`. Useful
  # when a previous run was cancelled by GitHub's pending-cancel logic.
  workflow_dispatch:

# Serialize against same-workflow runs only. The previous version used a
# shared `gh-pages-deploy` group across documentation.yml +
# documentation-beta.yml + documentation-dev.yml — that turned out to be
# wrong: when multiple events queue simultaneously (e.g. a push event on
# the merge commit + a pull_request event for an open PR against beta),
# GitHub's "any previously pending job or workflow in the concurrency
# group will be cancelled" rule cancels the push run. Now each workflow
# only serializes with itself; the parallel beta+main+dev jobs may race
# the gh-pages branch but `peaceiris/actions-gh-pages@v3` with
# `keep_files: true` force-pushes, and the latest push wins.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    # Only deploy on push, not on pull requests
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install and build component styleguide
        timeout-minutes: 10
        run: |
          cd styleguide
          npm ci --legacy-peer-deps
          npm run build

      - name: Clear build cache and install dependencies
        timeout-minutes: 3
        run: |
          cd docusaurus
          rm -rf node_modules/.cache
          rm -rf .docusaurus
          rm -rf build
          npm run ci

      - name: Verify build output
        run: |
          cd docusaurus/build
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found in build directory!"
            exit 1
          fi

      - name: Copy styleguide into Docusaurus build
        run: |
          mkdir -p docusaurus/build/styleguide
          cp -r styleguide/build/. docusaurus/build/styleguide/


      - name: Create .nojekyll file
        run: |
          cd docusaurus/build
          touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docusaurus/build
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          force_orphan: false
          allow_empty_commit: true
          keep_files: true

      - name: Verify deployment
        run: |
          git fetch origin gh-pages
          echo "Deployment completed. Latest commit: $(git rev-parse origin/gh-pages)"
